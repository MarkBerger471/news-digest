name: News Digest Cron

on:
  schedule:
    # Morning edition: 7am Bangkok (UTC+7) = midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      edition:
        description: "Edition to generate (morning/evening)"
        required: false
        default: ""

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Determine edition
        id: edition
        run: |
          if [ -n "${{ github.event.inputs.edition }}" ]; then
            echo "edition=${{ github.event.inputs.edition }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ=Asia/Bangkok date +%H)
            if [ "$HOUR" -lt 12 ]; then
              echo "edition=morning" >> $GITHUB_OUTPUT
            else
              echo "edition=evening" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Fetch and summarize news
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GOOGLE_TTS_KEY: ${{ secrets.GOOGLE_TTS_KEY }}
          EDITION: ${{ steps.edition.outputs.edition }}
        run: node fetch-news.js

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update news digest: ${{ steps.edition.outputs.edition }} edition $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
